name: Create AI Skill Package
id: com.openaiskillpackage.create-aiskill
uuid: a1805527-85e9-4002-9ab3-770084e9b45c
version: 2.2.0
description: Scaffolds a new .aiskill package with full repo structure, git init, GitHub remote, all required templates, and the pack.py packaging script.
author: Anthony Harrison
authorEmail: widgets@penrithbeacon.com
entry: SKILL.md
system_protocol_version: "1.0.0"
license: MIT
minimum_runtime: "1.0.0"
capabilities:
  - filesystem.read
  - filesystem.write
  - process.exec
permissions:
  filesystem.write:
    paths:
      - "<aiskills_root>/AISKILL-*"
homepage: https://openaiskillpackage.com/
repository: https://github.com/PenrithBeacon/AISKILL-CREATE-AISKILL
tags: [scaffold, create, aiskill, package, generator, meta]
type: procedural
changelog:
  - version: 2.2.0
    changes:
      - "BREAKING: SYSTEM.md promoted to a fourth REQUIRED package file (.aiskill spec v2.2.0) — an invariant, versioned verification protocol, identical across every compliant package, that an AI agent must follow before executing SKILL.md. Packages built before this version lack it and no longer conform"
      - "New required manifest field: system_protocol_version, declaring which SYSTEM.md version the package ships — must match SYSTEM.md's own Protocol Version header"
      - scaffold.py now copies SYSTEM.md verbatim from assets/templates/SYSTEM.md into every new package (this repo's own skill/SYSTEM.md is a synced copy of that same source, since this meta-skill is itself a .aiskill package)
      - "pack.py refuses to package if skill/SYSTEM.md doesn't byte-match the canonical template exactly — stricter than CARD.md's regenerate-before-packaging rule, since SYSTEM.md should never legitimately vary at all"
      - SKILL.md documents the new step and manifest field; Pre-Release Checklist gains matching checks
  - version: 2.1.0
    changes:
      - "SKILL.md new Step 1 — Choose a license: mandatory gated conversation before scaffolding, offers common open-source options (MIT first) if the user is unsure, falls back to license: UNLICENSED rather than silently defaulting if undecided"
      - Bundled skill/LICENSE.txt (MIT) — conforms to the v2.1.0 .aiskill spec's optional bundled license file
      - UNLICENSED documented as a recognized license manifest value
      - "scaffold.py --license default changed from MIT to UNLICENSED"
  - version: 2.0.0
    changes:
      - "BREAKING: CARD.md promoted to a third REQUIRED package file, alongside manifest.yaml and SKILL.md — packages built before this version lack it and no longer conform"
      - build_card.py — deterministically generates CARD.md from manifest.yaml; the same manifest always produces the same CARD.md, never hand-edited
      - scaffold.py now seeds a CARD.md placeholder (overwritten by build_card.py before packaging)
      - SKILL.md gains a new Step 4 (Generate CARD.md), renumbering the remaining steps
      - Removed the legacy --dashboard-dir drop-zone copy from pack.py's documented usage — each repo's own dist/ folder is now the only source of truth for a finished .aiskill
  - version: 1.0.0
    changes:
      - Initial release — the meta-skill for creating .aiskill packages
      - scaffold.py — creates complete AISKILL-{SLUG} repo and directory structure
      - pack.py — generates checksums.yaml and packages the .aiskill archive
      - Six template files covering all required skill artifacts
      - Unit tests for all scaffold utility functions
