name: Create AI Skill Package
id: com.openaiskillpackage.create-aiskill
uuid: a1805527-85e9-4002-9ab3-770084e9b45c
version: 2.4.2
description: Scaffolds a new, originally-authored .aiskill package (Track A), or converts an existing skill from a foreign Agent Skills repo into one or more .aiskill packages with per-skill license gating (Track B).
synopsis: |
  Create AI Skill Package is the meta-skill that produces every other .aiskill
  package in this ecosystem. It has two tracks: scaffold a brand-new,
  originally-authored package from a plain-language description of what it
  should do (Track A), or convert an existing skill already built to the open
  Agent Skills format -- SKILL.md with YAML frontmatter, as used by Claude
  Code, Cursor, and others -- into one or more .aiskill packages, carrying
  forward the original license and provenance rather than re-authoring it
  from scratch (Track B).

  Reach for Track A whenever a procedure is worth turning into a verified,
  versioned, unit-tested package instead of a prompt kept in a notes file --
  something you or a team will run repeatedly and want to trust. Reach for
  Track B when a skill already exists for a different AI agent format and
  you want it brought into this ecosystem's stronger verification model:
  mandatory unit testing, checksummed integrity, and a registry-based
  external verification check that neither the Agent Skills format nor most
  other skill formats provide on their own.

  This is the one .aiskill package that was not itself produced by another
  .aiskill package -- every package that exists or will exist in this
  ecosystem was scaffolded or converted using this one. It ships with a full
  unit test suite covering both tracks' naming conventions, per-skill license
  classification, and the automatic assets/-prefixed path rewriting that
  conversion depends on, and every package it produces carries SYSTEM.md's
  external verification protocol from the moment it's created.
author: Anthony Harrison
authorEmail: widgets@penrithbeacon.com
entry: SKILL.md
system_protocol_version: "1.0.0"
license: MIT
minimum_runtime: "1.0.0"
capabilities:
  - filesystem.read
  - filesystem.write
  - process.exec
  - network.fetch
permissions:
  filesystem.write:
    paths:
      - "<aiskills_root>/AISKILL-*"
  network.fetch:
    hosts:
      - "github.com"
homepage: https://openaiskillpackage.com/
repository: https://github.com/PenrithBeacon/AISKILL-CREATE-AISKILL
tags: [scaffold, create, aiskill, package, generator, meta]
type: procedural
changelog:
  - version: 2.4.2
    changes:
      - "fix: manifest.yaml's name/description substitution is now YAML-safely quoted -- a source skill title containing a colon (e.g. \"TransformerLens: Mechanistic Interpretability for Transformers\") previously broke manifest.yaml parsing entirely, since the bare unquoted substitution let YAML read \"X: Y\" as a nested mapping key/value. Fixed in both convert.py and scaffold.py; new yaml_quote() helper added to each, applied only to the manifest.yaml substitution (README.md/CHANGELOG.md keep the same tokens unquoted, since a colon in markdown prose is harmless)."
  - version: 2.4.1
    changes:
      - "fix: copy_skill_assets no longer silently drops top-level source directories/files outside the fixed scripts/references/examples/templates/assets DIR_MAP -- caught converting claude-api (per-language subdirs), slack-gif-creator (bare core/ module + requirements.txt), and theme-factory (themes/ + a loose showcase PDF), all 3 of which were shipping with zero bundled files despite their SKILL.md explicitly referencing that content. Unrecognized directories/files now copy through to assets/templates/<original-name> instead of being dropped."
  - version: 2.4.0
    changes:
      - "BREAKING (.aiskill spec v2.3.0): new required manifest field synopsis -- a multi-paragraph, hand-authored expansion of description, feeding both README.md's opening and CARD.md's rendering (build_card.py updated accordingly)"
      - "Retired README.skill.md.template and README.skill.md.converted.template -- there is now exactly one README template per track (README.repo.md.template / .converted.template), rendered once and written identically to both the repo root and skill/README.md"
      - "scaffold.py and convert.py both now require --synopsis (convert.py: required only in single-skill --source-path mode; batch/cherry-pick runs get a TODO placeholder per skill, to be hand-authored afterward, same as capabilities/permissions)"
      - "pack.py gained a new pre-flight check, verify_readme_matches_root -- refuses to package if the repo-root README.md and skill/README.md aren't byte-identical, matching the .aiskill spec v2.3.0 requirement enforced independently by the Cup and Ring Registry at registration"
      - "SKILL.md: Track A gained a new Step 2 (Write a synopsis), renumbering Steps 2-8 to 3-9; Track B's Steps 2 and 5 updated to cover synopsis generation and hand-authoring; Manifest Field Reference, Template Token Reference, and both Pre-Release Checklists updated to match"
  - version: 2.3.1
    changes:
      - "Fixed convert.py: str | None annotations were unguarded and would raise a TypeError on Python 3.8/3.9 -- added from __future__ import annotations. Caught while fact-checking the README's own Python version claim"
      - "Rewrote the README's Prerequisites, Under the Bonnet, This Skill in Particular, On Public Distribution, and Specification sections to properly cover the conversion capability -- previously only Quick Start and the Independence Day callout had been updated"
      - "Corrected the README's claim that gh CLI is 'only needed to publish a GitHub release' -- it's also used to create the repository itself, and both have a manual web-UI alternative"
      - "Dropped the Python version prerequisite entirely -- the spec requires only 'scripts', not Python specifically, and the AI agent handles runtime needs invisibly"
      - "Named and linked the Cup and Ring Registry explicitly, and explained why publishing requires a real GitHub account (accountability, not a technical format requirement)"
  - version: 2.3.0
    changes:
      - "New Track B: converting an existing skill from a foreign Agent Skills repo into one or more .aiskill packages — SKILL.md gains a Step 0 gateway (original vs. converted), and a new convert.py script (discover single/cherry-picked/batch skills, resolve per-skill license, classify a provisional tier, map directories, rewrite bare path references to assets/-prefixed form, generate the package)"
      - "Three-tier license gate, always per-skill never per-repo: tier 1 (permissive) converts immediately; tier 2 (absent/ambiguous) and tier 3 (explicit proprietary/all-rights-reserved) require a human attestation, logged in both manifest.yaml (license_attestation) and README.md (## License Attestation) — tier 3 requires a fresh attestation every time, never a standing authorization"
      - "Batch/cherry-pick runs process every tier-1 skill immediately and defer every tier-2/3 skill to a single list, resolved afterward via convert.py --attestation-for"
      - "New manifest.yaml fields: origin, source_owner, source_repo, source_path, converted_at, license_attestation — new manifest.yaml.converted.template, README.*.converted.template, CHANGELOG.md.converted.template"
      - "New converted-package repo-naming pattern, AISKILL-{origin}-{SLUG} with the origin segment always lowercased (.aiskill spec v2.2.1) — computed correctly by convert.py from the start, rather than fixed after the fact"
      - "New test_convert.py (15 tests) using real license-text fixtures from the first conversion batch, including the actual anthropics/skills proprietary notice that motivated the tier-3 gate"
      - "Fixed stale v2.0.0 docstring headers in scaffold.py/build_card.py; caught up the top-level CHANGELOG.md to match skill/CHANGELOG.md; fixed inputs/schema.json's stale MIT license default to UNLICENSED"
  - version: 2.2.0
    changes:
      - "BREAKING: SYSTEM.md promoted to a fourth REQUIRED package file (.aiskill spec v2.2.0) — an invariant, versioned verification protocol, identical across every compliant package, that an AI agent must follow before executing SKILL.md. Packages built before this version lack it and no longer conform"
      - "New required manifest field: system_protocol_version, declaring which SYSTEM.md version the package ships — must match SYSTEM.md's own Protocol Version header"
      - scaffold.py now copies SYSTEM.md verbatim from assets/templates/SYSTEM.md into every new package (this repo's own skill/SYSTEM.md is a synced copy of that same source, since this meta-skill is itself a .aiskill package)
      - "pack.py refuses to package if skill/SYSTEM.md doesn't byte-match the canonical template exactly — stricter than CARD.md's regenerate-before-packaging rule, since SYSTEM.md should never legitimately vary at all"
      - SKILL.md documents the new step and manifest field; Pre-Release Checklist gains matching checks
  - version: 2.1.0
    changes:
      - "SKILL.md new Step 1 — Choose a license: mandatory gated conversation before scaffolding, offers common open-source options (MIT first) if the user is unsure, falls back to license: UNLICENSED rather than silently defaulting if undecided"
      - Bundled skill/LICENSE.txt (MIT) — conforms to the v2.1.0 .aiskill spec's optional bundled license file
      - UNLICENSED documented as a recognized license manifest value
      - "scaffold.py --license default changed from MIT to UNLICENSED"
  - version: 2.0.0
    changes:
      - "BREAKING: CARD.md promoted to a third REQUIRED package file, alongside manifest.yaml and SKILL.md — packages built before this version lack it and no longer conform"
      - build_card.py — deterministically generates CARD.md from manifest.yaml; the same manifest always produces the same CARD.md, never hand-edited
      - scaffold.py now seeds a CARD.md placeholder (overwritten by build_card.py before packaging)
      - SKILL.md gains a new Step 4 (Generate CARD.md), renumbering the remaining steps
      - Removed the legacy --dashboard-dir drop-zone copy from pack.py's documented usage — each repo's own dist/ folder is now the only source of truth for a finished .aiskill
  - version: 1.0.0
    changes:
      - Initial release — the meta-skill for creating .aiskill packages
      - scaffold.py — creates complete AISKILL-{SLUG} repo and directory structure
      - pack.py — generates checksums.yaml and packages the .aiskill archive
      - Six template files covering all required skill artifacts
      - Unit tests for all scaffold utility functions
